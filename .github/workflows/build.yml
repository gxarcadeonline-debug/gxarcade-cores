name: Build Vecx Core

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 pkg-config

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Build vecx core
        run: |
          source emsdk/emsdk_env.sh
          git clone https://github.com/libretro/libretro-vecx.git
          cd libretro-vecx

          emmake make -f Makefile.libretro platform=emscripten EMSCRIPTEN=1 -j2

          echo "Archivos generados:"
          ls -la

      - name: Clone EmulatorJS builder
        run: |
          source emsdk/emsdk_env.sh
          git clone https://github.com/EmulatorJS/EmulatorJS.git

      - name: Build WASM core
        run: |
          source emsdk/emsdk_env.sh

          mkdir -p EmulatorJS/data/cores

          cp libretro-vecx/vecx_libretro_emscripten.bc EmulatorJS/

          cd EmulatorJS

          # 🔥 AQUÍ ESTÁ EL FIX REAL
          emcc vecx_libretro_emscripten.bc \
          -O3 \
          -s WASM=1 \
          -s SIDE_MODULE=1 \
          -o data/cores/vecx_libretro.js

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: vecx-core
          path: EmulatorJS/data/cores/
