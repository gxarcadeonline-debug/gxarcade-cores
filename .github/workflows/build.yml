name: Build Vecx Core

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 pkg-config p7zip-full zip

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install 3.1.51
          ./emsdk activate 3.1.51

      - name: Build vecx core
        run: |
          source emsdk/emsdk_env.sh
          git clone https://github.com/libretro/libretro-vecx.git
          cd libretro-vecx
          emmake make -f Makefile.libretro platform=emscripten EMSCRIPTEN=1 -j2

      - name: Clone RetroArch EmulatorJS
        run: |
          git clone https://github.com/EmulatorJS/RetroArch.git --branch next

      - name: Prepare core
        run: |
          cp libretro-vecx/vecx_libretro_emscripten.bc RetroArch/dist-scripts/vecx_libretro.bc

      - name: Build WASM
        run: |
          source emsdk/emsdk_env.sh
          cd RetroArch/emulatorjs
          emmake ./build-emulatorjs.sh

      - name: Upload core
        uses: actions/upload-artifact@v4
        with:
          name: vecx-core
          path: EmulatorJS/data/cores/
